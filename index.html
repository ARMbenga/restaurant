<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant</title>
    <style>
        body {
            background-image: url("./nourriture.jpg");
            background-size: cover;
            text-align: center
        }

        .barredenav {
            display: block;
            text-align: right;
        }

        .barredenav li {
            list-style: none;
            display: inline-block;
        }

        .barredenav li a {
            background-color: white;
            color: black;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            font-size: 3em;
        }

        p {
            color: rgb(205, 233, 80);
            background-color: white;
            font-size: 3.2em;
            text-align: center;
            background-size: cover;
            display: inline-block;
            margin-top: 200px;


        }

        div+p {
            margin: auto;
            padding: 10px;


        }

        .bon {
            justify-content: center;
            align-items: center;

        }

        span {
            color: black;
        }
    </style>
</head>

<body>
    <div class="barredenav">
        <ul>
            <li><a href="#">Accueil</a></li>
            <li><a href="#">Plat</a></li>
            <li><a href="#">Commande</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </div>
    <div class="bon">
        <p>
            <span>Bon </span>appétit
        </p>
    </div>


</body>

</html>
